<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AEGIS // SHORTCIRCUIT COMMAND CENTER</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --cyan: #00f2ff;
            --bg-dark: #020408;
            --card-bg: rgba(10, 15, 20, 0.85);
            --pass-green: #00ff9d;
            --fail-red: #ff3b3b;
        }
        
        body {
            background-color: var(--bg-dark);
            color: #ecf0f1;
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-image: 
                radial-gradient(circle at 10% 10%, rgba(0, 242, 255, 0.03) 0%, transparent 40%),
                linear-gradient(rgba(0, 242, 255, 0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 242, 255, 0.02) 1px, transparent 1px);
            background-size: 100% 100%, 40px 40px, 40px 40px;
            overflow: hidden;
            height: 100vh;
        }

        .scifi-card {
            background: var(--card-bg);
            border: 1px solid rgba(0, 242, 255, 0.1);
            backdrop-filter: blur(12px);
            position: relative;
        }

        .scifi-card::before { content: ''; position: absolute; top: -1px; left: -1px; width: 12px; height: 12px; border-top: 2px solid var(--cyan); border-left: 2px solid var(--cyan); }
        .scifi-card::after { content: ''; position: absolute; bottom: -1px; right: -1px; width: 12px; height: 12px; border-bottom: 2px solid var(--cyan); border-right: 2px solid var(--cyan); }

        .terminal-scroll { scrollbar-width: none; }
        .terminal-scroll::-webkit-scrollbar { display: none; }

        .neural-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
            gap: 16px;
            padding: 10px;
        }

        .gate-dot { width: 8px; height: 8px; border-radius: 50%; background: rgba(255,255,255,0.05); transition: all 0.3s; }
        .gate-dot.pass { background: var(--pass-green); box-shadow: 0 0 8px var(--pass-green); }
        .gate-dot.fail { background: var(--fail-red); box-shadow: 0 0 8px var(--fail-red); }
        .gate-dot.scanning { background: var(--cyan); animation: pulse 1s infinite; }

        @keyframes pulse { 0% { opacity: 0.3; } 50% { opacity: 1; } 100% { opacity: 0.3; } }

        .header-font { font-family: 'Plus Jakarta Sans', sans-serif; font-weight: 800; letter-spacing: -0.05em; }
        .mono { font-family: 'JetBrains Mono', monospace; }
        
        .profile-bar { height: 4px; border-radius: 2px; }
    </style>
</head>
<body class="flex flex-col">

    <!-- TOP HEADER -->
    <header class="h-16 flex items-center justify-between px-8 border-b border-white/5 bg-black/40">
        <div class="flex items-center space-x-6">
            <div class="flex flex-col">
                <span class="text-[9px] font-black tracking-[0.4em] text-cyan-400 opacity-60">SYSTEM STATUS</span>
                <span id="system-status" class="text-xs font-bold text-pass-green">NEURAL LINK STABLE</span>
            </div>
            <h1 class="text-xl header-font italic uppercase tracking-tighter">AEGIS <span class="text-cyan-400 not-italic opacity-40">// ALGO COMMAND CENTER</span></h1>
        </div>
        <div class="flex items-center space-x-12">
            <div class="text-right">
                <span class="block text-[8px] opacity-30 uppercase tracking-widest">SESSION P&L</span>
                <span id="session-pnl" class="text-xl font-bold mono">&#8377;0.00</span>
            </div>
            <div class="text-right border-l border-white/10 pl-12">
                <span id="clock" class="text-lg font-black mono text-cyan-400">00:00:00</span>
            </div>
        </div>
    </header>

    <!-- MAIN AREA -->
    <main class="flex-grow flex flex-col p-6 overflow-hidden">
        
        <!-- Live Candidates Grid -->
        <div id="neural-grid" class="neural-grid overflow-y-auto flex-grow max-h-[calc(100vh-250px)]">
            <!-- Dynamic Candidate Cards -->
            <div id="no-candidates" class="col-span-full h-full flex flex-col items-center justify-center opacity-20">
                <div class="w-32 h-32 border-2 border-dashed border-cyan-400/30 rounded-full animate-spin-slow mb-6"></div>
                <p class="text-lg uppercase tracking-[0.5em]">Scanning Alpha Spectrum</p>
            </div>
        </div>

        <!-- TERMINAL AREA -->
        <div class="h-48 mt-6 scifi-card flex flex-col overflow-hidden">
            <div class="h-8 border-b border-white/5 flex items-center px-4 justify-between bg-white/5">
                <span class="text-[9px] font-black uppercase tracking-widest text-cyan-400">Live System Intelligence Feed</span>
                <div class="flex space-x-1"><div class="w-1 h-1 bg-cyan-400"></div><div class="w-1 h-1 bg-white/20"></div><div class="w-1 h-1 bg-white/10"></div></div>
            </div>
            <div id="terminal" class="flex-grow p-4 overflow-y-auto terminal-scroll font-mono text-[10px] space-y-1">
                <div class="text-cyan-400/40">>> Initializing AEGIS Protocol v2.5.0...</div>
            </div>
        </div>
    </main>

    <!-- CARD TEMPLATE (HIDDEN) -->
    <template id="candidate-template">
        <div class="candidate-card scifi-card p-4 flex flex-col animate-in fade-in slide-in-from-bottom-4 duration-500">
            <div class="flex justify-between items-start mb-3">
                <div class="flex flex-col">
                    <h3 class="symbol text-2xl font-black header-font tracking-tighter">SYMBOL</h3>
                    <span class="ltp text-xs mono opacity-50">&#8377;000.00</span>
                </div>
                <div class="text-right">
                    <span class="gain text-lg font-black text-pass-green">+0.00%</span>
                    <div class="flex space-x-1 justify-end mt-1">
                        <div class="g-dot g1 gate-dot"></div>
                        <div class="g-dot g2 gate-dot"></div>
                        <div class="g-dot g4 gate-dot"></div>
                        <div class="g-dot g5 gate-dot"></div>
                        <div class="g-dot g7 gate-dot"></div>
                        <div class="g-dot g9 gate-dot"></div>
                        <div class="g-dot g12 gate-dot"></div>
                    </div>
                </div>
            </div>

            <div class="flex-grow flex space-x-4">
                <!-- Sparklines -->
                <div class="flex-1 h-20 bg-black/40 rounded border border-white/5 relative overflow-hidden">
                    <canvas class="sparkline"></canvas>
                </div>
                <!-- Profile -->
                <div class="w-16 h-20 flex flex-col-reverse justify-between py-1 bg-white/5 rounded border border-white/5 overflow-hidden profile-container">
                    <!-- Volume profile bars injected here -->
                </div>
            </div>

            <div class="mt-3 flex justify-between text-[9px] mono opacity-40 uppercase tracking-widest border-t border-white/5 pt-2">
                <span>RVOL: <b class="rvol text-cyan-400">0.0</b></span>
                <span>Z: <b class="zscore text-cyan-400">0.0</b></span>
                <span>VWAP: <b class="slope text-cyan-400">0.0</b></span>
            </div>
        </div>
    </template>

    <script>
        const grid = document.getElementById('neural-grid');
        const terminal = document.getElementById('terminal');
        const template = document.getElementById('candidate-template');
        const candidates = new Map();

        const ws = new WebSocket(`ws://${window.location.host}/ws`);

        const getSafeId = (sym) => `card-${sym.replace(/[^a-z0-9]/gi, '_')}`;

        function addLog(msg, level = 'INFO') {
            const div = document.createElement('div');
            let color = 'rgba(255,255,255,0.6)';
            if (msg.includes('[ENTRY]')) color = '#00ff9d';
            if (msg.includes('[EXIT]') || msg.includes('REJECTED')) color = '#ff3b3b';
            if (msg.includes('CONFIRMED')) color = '#00f2ff';
            
            div.style.color = color;
            div.innerHTML = `<span class="opacity-20">[${new Date().toLocaleTimeString()}]</span> ${msg}`;
            terminal.appendChild(div);
            terminal.scrollTop = terminal.scrollHeight;
            if (terminal.children.length > 100) terminal.removeChild(terminal.firstChild);
        }

        ws.onmessage = (event) => {
            const msg = JSON.parse(event.data);
            const { type, payload } = msg;

            if (type === 'LOG_STREAM') {
                addLog(payload.msg, payload.level);
            } 
            else if (type === 'SCAN_BATCH') {
                document.getElementById('no-candidates').style.display = 'none';
                // Clear symbols not in this batch
                for (let sym of candidates.keys()) {
                    if (!payload.candidates.includes(sym)) {
                        const el = document.getElementById(getSafeId(sym));
                        if (el) el.remove();
                        candidates.delete(sym);
                    }
                }
                // Ensure all batch symbols have cards
                payload.candidates.forEach(sym => {
                    if (!candidates.has(sym)) createCard(sym);
                });
            }
            else if (type === 'CANDIDATE_PULSE') {
                const sym = payload.symbol;
                if (!candidates.has(sym)) createCard(sym);
                updateCard(sym, payload);
            }
            else if (type === 'GATE_UPDATE') {
                const sym = payload.symbol;
                const card = document.getElementById(getSafeId(sym));
                if (card) {
                    const dot = card.querySelector(`.g-dot.${payload.gate.toLowerCase()}`);
                    if (dot) {
                        dot.className = `g-dot ${payload.gate.toLowerCase()} gate-dot ${payload.status.toLowerCase()}`;
                    }
                    if (payload.status === 'FAIL') {
                        card.classList.add('rejected');
                        const reason = card.querySelector('.reason');
                        if (reason) reason.innerText = payload.value || '';
                    }
                }
            }
            else if (type === 'AMT_UPDATE') {
                const sym = payload.symbol;
                const card = document.getElementById(getSafeId(sym));
                if (card) updateProfile(card, payload);
            }
            else if (type === 'HEARTBEAT') {
                document.getElementById('session-pnl').innerText = `₹${payload.pnl.toLocaleString('en-IN', {minimumFractionDigits: 2})}`;
                document.getElementById('session-pnl').style.color = payload.pnl >= 0 ? '#00ff9d' : '#ff3b3b';
            }
        };

        function createCard(sym) {
            const clone = template.content.cloneNode(true);
            const card = clone.querySelector('.candidate-card');
            card.id = getSafeId(sym);
            card.querySelector('.symbol').innerText = sym;
            
            // Init Chart
            const ctx = card.querySelector('.sparkline').getContext('2d');
            const chart = new Chart(ctx, {
                type: 'line',
                data: { labels: Array(20).fill(''), datasets: [{ data: [], borderColor: '#00f2ff', borderWidth: 1, pointRadius: 0, fill: true, backgroundColor: 'rgba(0,242,255,0.05)' }]},
                options: { responsive: true, maintainAspectRatio: false, scales: { x: { display: false }, y: { display: false } }, plugins: { legend: { display: false } } }
            });
            
            candidates.set(sym, { chart, history: [] });
            grid.appendChild(card);
        }

        function updateCard(sym, data) {
            const card = document.getElementById(getSafeId(sym));
            if (!card) return;

            if (data.ltp) card.querySelector('.ltp').innerText = `₹${data.ltp.toFixed(2)}`;
            if (data.gain_pct) {
                const g = card.querySelector('.gain');
                g.innerText = `${data.gain_pct.toFixed(2)}%`;
                g.style.color = data.gain_pct >= 0 ? '#00ff9d' : '#ff3b3b';
            }
            if (data.rvol) card.querySelector('.rvol').innerText = data.rvol.toFixed(1);
            if (data.slope) card.querySelector('.slope').innerText = data.slope.toFixed(1);
            
            // Status confirmed color
            if (data.status === 'CONFIRMED') {
                card.style.borderColor = '#00ff9d';
                card.style.boxShadow = '0 0 20px rgba(0,255,157,0.1)';
            }

            // Update Chart
            const state = candidates.get(sym);
            if (state && data.ltp) {
                state.chart.data.datasets[0].data.push(data.ltp);
                if (state.chart.data.datasets[0].data.length > 20) state.chart.data.datasets[0].data.shift();
                state.chart.update('none');
            }
        }

        function updateProfile(card, data) {
            const container = card.querySelector('.profile-container');
            container.innerHTML = '';
            const max = Math.max(...data.counts);
            data.counts.forEach((c, i) => {
                const bar = document.createElement('div');
                const p = (c / max) * 100;
                bar.className = 'profile-bar';
                bar.style.width = `${p}%`;
                bar.style.background = 'rgba(255,255,255,0.1)';
                
                const price = data.bins[i];
                if (price >= data.val && price <= data.vah) bar.style.background = 'rgba(0,242,255,0.3)';
                if (Math.abs(price - data.poc) < (data.bins[1]-data.bins[0])) bar.style.background = '#00ff9d';
                
                container.appendChild(bar);
            });
        }

        setInterval(() => {
            document.getElementById('clock').innerText = new Date().toLocaleTimeString();
        }, 1000);
    </script>
</body>
</html>
