<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShortCircuit — AEGIS HUD</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --cyan: #00f2ff;
            --cyan-dim: rgba(0, 242, 255, 0.15);
            --bg-dark: #05070a;
            --card-bg: rgba(13, 17, 23, 0.8);
        }
        
        * { scrollbar-width: thin; scrollbar-color: var(--cyan) transparent; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: var(--cyan); border-radius: 10px; }

        body {
            background-color: var(--bg-dark);
            color: #ecf0f1;
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-image: 
                linear-gradient(rgba(0, 242, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 242, 255, 0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .scifi-card {
            background: var(--card-bg);
            border: 1px solid rgba(0, 242, 255, 0.1);
            position: relative;
            backdrop-filter: blur(10px);
        }

        /* L-Corners */
        .scifi-card::before, .scifi-card::after, 
        .scifi-card-inner::before, .scifi-card-inner::after {
            content: '';
            position: absolute;
            width: 8px; height: 8px;
            border-color: var(--cyan);
            pointer-events: none;
        }
        /* Top Left */
        .scifi-card::before { top: -1px; left: -1px; border-top: 2px solid; border-left: 2px solid; }
        /* Bottom Right */
        .scifi-card::after { bottom: -1px; right: -1px; border-bottom: 2px solid; border-right: 2px solid; }

        .neon-glow {
            text-shadow: 0 0 10px rgba(0, 242, 255, 0.5);
        }

        .gate-grid-item {
            transition: all 0.3s ease;
            background: rgba(255, 255, 255, 0.02);
            border-left: 2px solid transparent;
        }
        .gate-inactive { opacity: 0.3; }
        .gate-pass { border-left-color: #00ff9d; background: rgba(0, 255, 157, 0.05); opacity: 1; }
        .gate-fail { border-left-color: #ff3b3b; background: rgba(255, 59, 59, 0.05); opacity: 1; }
        .gate-scanning { border-left-color: var(--cyan); animation: pulse 2s infinite; opacity: 0.8; }

        @keyframes pulse {
            0%, 100% { background: rgba(0, 242, 255, 0.02); }
            50% { background: rgba(0, 242, 255, 0.1); }
        }

        .mono { font-family: 'JetBrains Mono', monospace; }
        
        .stat-val { font-size: 1.75rem; font-weight: 800; color: var(--cyan); }
    </style>
</head>
<body class="p-4 md:p-6 lg:p-10">
    
    <!-- Top Nav -->
    <header class="flex flex-wrap justify-between items-center mb-8 gap-4">
        <div class="flex items-center space-x-4">
            <div class="w-12 h-12 scifi-card flex items-center justify-center">
                <svg class="w-6 h-6 text-[#00f2ff]" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z" />
                </svg>
            </div>
            <div>
                <h1 class="text-3xl font-black tracking-tight neon-glow uppercase italic">AEGIS <span class="text-white/40 not-italic">HUD</span></h1>
                <div class="flex items-center space-x-2">
                    <div class="w-1.5 h-1.5 bg-cyan-400 rounded-full animate-ping"></div>
                    <p id="status-text" class="text-[10px] uppercase tracking-[0.2em] font-semibold text-cyan-400/80">Neural Link: Active</p>
                </div>
            </div>
        </div>

        <div class="flex space-x-4">
            <div class="scifi-card px-6 py-3 flex flex-col justify-center min-w-[160px]">
                <span class="text-[9px] uppercase tracking-widest opacity-40">Session PnL</span>
                <span id="session-pnl" class="stat-val mono">&#8377;0.00</span>
            </div>
            <div class="scifi-card px-6 py-3 flex flex-col justify-center min-w-[160px]">
                <span class="text-[9px] uppercase tracking-widest opacity-40">System Time</span>
                <span id="clock" class="text-xl font-bold mono">00:00:00</span>
            </div>
        </div>
    </header>

    <!-- Main Layout -->
    <main class="grid grid-cols-1 md:grid-cols-12 gap-6 flex-grow overflow-y-auto">
        
        <!-- Left: Primary Ticker & Chart -->
        <div class="md:col-span-8 flex flex-col gap-6">
            
            <div class="scifi-card p-8 flex flex-col min-h-[400px]">
                <div class="flex justify-between border-b border-white/5 pb-6 mb-6">
                    <div>
                        <span id="active-symbol" class="text-7xl font-black header-font text-white uppercase tracking-tighter">---</span>
                        <div id="active-ltp" class="text-2xl opacity-60 mt-1 mono">&#8377;0.00</div>
                    </div>
                    <div class="text-right">
                        <div id="active-gain" class="text-4xl font-extrabold text-[#00ff9d]">+0.00%</div>
                        <span class="text-[10px] uppercase tracking-widest opacity-30">Real-time Performance</span>
                    </div>
                </div>

                <!-- Simulation/Placeholder -->
                <div class="flex-grow flex items-center justify-center bg-black/20 rounded border border-white/5 relative overflow-hidden">
                    <!-- Background decorative grid -->
                    <div class="absolute inset-0 opacity-10" style="background-image: radial-gradient(var(--cyan) 1px, transparent 1px); background-size: 20px 20px;"></div>
                    
                    <div class="z-10 flex flex-col items-center">
                        <div class="w-32 h-32 border border-cyan-500/20 rounded-full flex items-center justify-center animate-pulse">
                             <div class="w-24 h-24 border border-cyan-500/40 rounded-full flex items-center justify-center">
                                <span class="text-[10px] uppercase tracking-[0.5em] text-cyan-500 font-bold">Scanning</span>
                             </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Bottom Metrics -->
            <div class="grid grid-cols-1 sm:grid-cols-3 gap-6">
                <div class="scifi-card p-6">
                    <div class="flex justify-between items-start mb-4">
                        <span class="text-[9px] uppercase tracking-widest opacity-40">RVOL Gauge</span>
                        <div class="p-1 bg-cyan-500/10 rounded"><svg class="w-3 h-3 text-cyan-500" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6" /></svg></div>
                    </div>
                    <span id="metric-rvol" class="text-4xl font-bold mono text-cyan-400">0.0</span>
                    <div class="w-full bg-white/5 h-1 mt-4"><div class="bg-cyan-500 h-full w-[40%]"></div></div>
                </div>
                <div class="scifi-card p-6">
                    <div class="flex justify-between items-start mb-4">
                        <span class="text-[9px] uppercase tracking-widest opacity-40">VWAP Velocity</span>
                         <div class="p-1 bg-cyan-500/10 rounded"><svg class="w-3 h-3 text-cyan-500" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" /></svg></div>
                    </div>
                    <span id="metric-slope" class="text-4xl font-bold mono text-cyan-400">0.0</span>
                    <div class="w-full bg-white/5 h-1 mt-4"><div class="bg-cyan-500 h-full w-[60%]"></div></div>
                </div>
                <div class="scifi-card p-6">
                    <div class="flex justify-between items-start mb-4">
                        <span class="text-[9px] uppercase tracking-widest opacity-40">Benchmark</span>
                         <div class="p-1 bg-cyan-500/10 rounded"><svg class="w-3 h-3 text-cyan-500" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z" /></svg></div>
                    </div>
                    <span id="metric-nifty" class="text-2xl font-black uppercase text-white/80">NEUTRAL</span>
                </div>
            </div>
        </div>

        <!-- Right: Control / Gates -->
        <div class="md:col-span-4 flex flex-col gap-6">
            
            <div class="scifi-card p-6 flex flex-col overflow-hidden">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-xs font-bold uppercase tracking-widest text-cyan-400">Gate Status Loop</h2>
                    <span class="text-[8px] opacity-30 mono">v1.2.aegis</span>
                </div>
                
                <div id="gate-container" class="grid grid-cols-2 gap-3 overflow-y-auto pr-2 max-h-[350px]">
                    <!-- Gates -->
                </div>
            </div>

            <!-- Enhanced Logs -->
            <div class="scifi-card flex-grow p-6 flex flex-col min-h-[300px]">
                <div class="flex items-center justify-between mb-4">
                    <span class="text-[10px] font-bold uppercase tracking-[0.2em] opacity-50">Signal Intelligence Feed</span>
                    <div class="flex space-x-1"><div class="w-1 h-1 bg-cyan-400"></div><div class="w-1 h-1 bg-cyan-400/50"></div><div class="w-1 h-1 bg-cyan-400/20"></div></div>
                </div>
                <div id="log-container" class="flex-grow overflow-y-auto space-y-2 pr-2 font-mono text-[11px] text-cyan-100/70">
                    <div class="opacity-40">>> Initializing AEGIS core...</div>
                </div>
            </div>
        </div>
    </main>

    <script>
        const gates = [
            { id: 'G1', name: 'Gain/Limits' },
            { id: 'G2', name: 'RVOL Valid' },
            { id: 'G3', name: 'Circuit Guard' },
            { id: 'G4', name: 'Momentum' },
            { id: 'G5', name: 'Exhaustion' },
            { id: 'G6', name: 'Confluence' },
            { id: 'G7', name: 'Market Regime' },
            { id: 'G8', name: 'Cooldown' },
            { id: 'G9', name: 'HTF Trend' },
            { id: 'G10', name: 'Spread Lmt' },
            { id: 'G11', name: 'Time Gate' },
            { id: 'G12', name: 'Candle Check' },
            { id: 'G13', name: 'Risk Scale' },
        ];

        const container = document.getElementById('gate-container');
        gates.forEach(g => {
            const div = document.createElement('div');
            div.id = `gate-${g.id}`;
            div.className = 'gate-grid-item p-4 gate-inactive rounded-sm';
            div.innerHTML = `
                <div class="text-[8px] opacity-40 font-bold mb-1">${g.id}</div>
                <div class="text-[10px] font-bold uppercase tracking-tighter">${g.name}</div>
            `;
            container.appendChild(div);
        });

        const ws = new WebSocket(`ws://${window.location.host}/ws`);
        const log = document.getElementById('log-container');

        function addLog(text, color = 'rgba(0, 242, 255, 0.7)') {
            const div = document.createElement('div');
            div.style.color = color;
            div.innerHTML = `<span class="opacity-30">>></span> ${text}`;
            log.prepend(div);
            if (log.children.length > 50) log.removeChild(log.lastChild);
        }

        setInterval(() => {
            document.getElementById('clock').innerText = new Date().toTimeString().split(' ')[0];
        }, 1000);

        ws.onopen = () => addLog('Neural connection established.', '#00ff9d');
        
        ws.onmessage = (event) => {
            const msg = JSON.parse(event.data);
            const { type, payload } = msg;

            if (type === 'GATE_UPDATE') {
                const el = document.getElementById(`gate-${payload.gate}`);
                if (el) {
                    el.className = 'gate-grid-item p-4 rounded-sm gate-' + payload.status.toLowerCase();
                }
            } else if (type === 'HEARTBEAT') {
                document.getElementById('session-pnl').innerHTML = `&#8377;${payload.pnl.toLocaleString('en-IN', {minimumFractionDigits: 2})}`;
                document.getElementById('session-pnl').style.color = payload.pnl >= 0 ? '#00ff9d' : '#ff3b3b';
            } else if (type === 'SYMBOL_UPDATE') {
                document.getElementById('active-symbol').innerText = payload.symbol;
                document.getElementById('active-ltp').innerHTML = `&#8377;${payload.ltp.toLocaleString('en-IN', {minimumFractionDigits: 2})}`;
                document.getElementById('active-gain').innerText = `${payload.gain_pct.toFixed(2)}%`;
                document.getElementById('active-gain').style.color = payload.gain_pct >= 0 ? '#00ff9d' : '#ff3b3b';
                document.getElementById('metric-rvol').innerText = payload.rvol.toFixed(1);
                document.getElementById('metric-slope').innerText = payload.slope.toFixed(2);
                document.getElementById('metric-nifty').innerText = payload.nifty_trend;
            } else if (type === 'SYSTEM_ALERT') {
                addLog(payload.msg, '#00f2ff');
            } else if (type === 'ORDER_EVENT') {
                addLog(`[ORDER] ${payload.type} ${payload.symbol}`, payload.type === 'ENTRY' ? '#00ff9d' : '#ff3b3b');
            }
        };
    </script>
</body>
</html>
